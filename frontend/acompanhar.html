<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Acompanhar Candidatura — Rezende Energia</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .track-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 16px; }
    .track-header { text-align:center; margin-bottom:40px; }
    .track-header__brand { font-family:'Sora',sans-serif; font-size:1.1rem; font-weight:900; color:#fff; letter-spacing:-0.02em; }
    .track-header__sub   { font-size:.65rem; color:var(--ink-3); letter-spacing:.2em; text-transform:uppercase; margin-top:3px; }
    .track-hero h1 { font-family:'Sora',sans-serif; font-size:2rem; font-weight:900; color:#fff; letter-spacing:-.04em; margin:0 0 8px; }
    .track-hero p  { color:var(--ink-2); font-size:.95rem; line-height:1.6; margin:0; }

    .search-box {
      background:var(--surface); border:1px solid rgba(255,255,255,0.08);
      border-radius:var(--r-2xl); padding:32px; width:100%; max-width:480px;
      margin:32px 0; box-shadow:0 12px 40px rgba(0,0,0,0.4);
      position:relative; overflow:hidden;
    }
    .search-box::before {
      content:''; position:absolute; top:-60px; right:-60px;
      width:200px; height:200px;
      background:radial-gradient(circle,rgba(255,106,0,.1) 0%,transparent 65%);
      pointer-events:none;
    }

    .result-card {
      background:var(--surface); border:1px solid rgba(255,255,255,.07);
      border-radius:var(--r-xl); padding:24px; margin-bottom:16px;
      transition:transform .2s, border-color .2s;
    }
    .result-card:hover { transform:translateY(-2px); border-color:rgba(255,106,0,.3); }
    .result-card__header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .result-card__position { font-family:'Sora',sans-serif; font-size:1.05rem; font-weight:800; color:#fff; margin:0 0 4px; }
    .result-card__location { font-size:.82rem; color:var(--ink-3); }
    .result-card__date { font-size:.75rem; color:var(--ink-3); white-space:nowrap; }

    .status-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 14px; border-radius:40px; font-size:.8rem; font-weight:700;
    }
    .status-pill--PENDING  { background:rgba(255,184,48,.1);  color:#FFB830; border:1px solid rgba(255,184,48,.3); }
    .status-pill--APPROVED { background:rgba(46,204,113,.1);  color:#2ECC71; border:1px solid rgba(46,204,113,.3); }
    .status-pill--REJECTED { background:rgba(255,82,82,.1);   color:#FF5252; border:1px solid rgba(255,82,82,.3); }

    .timeline { position:relative; padding-left:20px; margin-top:16px; }
    .timeline::before { content:''; position:absolute; left:6px; top:0; bottom:0; width:1px; background:rgba(255,255,255,.08); }
    .timeline-item { position:relative; padding:0 0 14px 20px; }
    .timeline-item::before {
      content:''; position:absolute; left:-8px; top:5px;
      width:8px; height:8px; border-radius:50%;
      background:var(--fire); border:2px solid var(--surface);
    }
    .timeline-item:last-child { padding-bottom:0; }
    .timeline-item__status { font-size:.78rem; font-weight:700; color:#fff; }
    .timeline-item__date   { font-size:.72rem; color:var(--ink-3); margin-top:2px; }
    .timeline-item__note   { font-size:.8rem;  color:var(--ink-2); margin-top:4px; font-style:italic; }

    .empty-state { text-align:center; padding:48px 0; color:var(--ink-3); }
    .empty-state__icon { font-size:3rem; margin-bottom:12px; }

    .results-wrap { width:100%; max-width:600px; }
    .results-title { font-family:'Sora',sans-serif; font-size:1rem; font-weight:800; color:#fff; margin:0 0 16px; }
  </style>
</head>
<body>
<div class="track-wrap">
  <div class="track-header">
    <div class="track-header__brand">⚡ Rezende Energia</div>
    <div class="track-header__sub">Portal de Carreiras</div>
  </div>

  <div class="track-hero" style="text-align:center; max-width:480px; margin-bottom:8px;">
    <h1>Acompanhe sua candidatura</h1>
    <p>Digite seu CPF para consultar o status de todas as suas candidaturas sem precisar de login.</p>
  </div>

  <div class="search-box">
    <div class="form-field" style="margin-bottom:16px;">
      <label class="form-field__label">Seu CPF</label>
      <input id="cpf-input" type="text" class="form-field__input"
             placeholder="000.000.000-00" maxlength="14"
             oninput="maskCPF(this)" onkeydown="if(event.key==='Enter') search()">
    </div>
    <div id="search-alert" class="alert" style="display:none; margin-bottom:12px;"></div>
    <button class="btn btn--primary btn--full" onclick="search()" id="search-btn">
      🔍 Consultar
    </button>
    <div style="text-align:center; margin-top:16px;">
      <a href="/" style="color:var(--ink-3); font-size:.8rem; text-decoration:none;">
        ← Ver vagas abertas
      </a>
    </div>
  </div>

  <div class="results-wrap" id="results" style="display:none;"></div>
</div>

<script>
const STATUS_LABEL = { PENDING:'Em Análise', APPROVED:'Aprovado', REJECTED:'Não Aprovado' };
const STATUS_ICON  = { PENDING:'⏳', APPROVED:'✅', REJECTED:'❌' };

function maskCPF(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  el.value = v;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'});
}

async function search() {
  const cpf     = document.getElementById('cpf-input').value.trim();
  const alert   = document.getElementById('search-alert');
  const btn     = document.getElementById('search-btn');
  const results = document.getElementById('results');

  alert.style.display = 'none';
  const clean = cpf.replace(/\D/g,'');
  if (clean.length !== 11) {
    alert.className = 'alert alert--error';
    alert.textContent = '❌ Digite um CPF válido com 11 dígitos.';
    alert.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = 'Consultando...';

  try {
    const r = await fetch(`/api/candidaturas/track?cpf=${clean}`);
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Erro'); }
    const data = await r.json();

    results.style.display = 'block';

    if (data.length === 0) {
      results.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔎</div>
          <p>Nenhuma candidatura encontrada para este CPF.</p>
          <p style="font-size:.82rem;margin-top:8px;">Verifique o CPF ou <a href="/" style="color:var(--fire)">candidate-se a uma vaga</a>.</p>
        </div>`;
      return;
    }

    results.innerHTML = `
      <p class="results-title">📋 ${data.length} candidatura${data.length > 1 ? 's' : ''} encontrada${data.length > 1 ? 's' : ''}</p>
      ${data.map(c => `
        <div class="result-card">
          <div class="result-card__header">
            <div>
              <p class="result-card__position">${c.position}</p>
              <p class="result-card__location">📍 ${c.location}</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
              <span class="status-pill status-pill--${c.status}">
                ${STATUS_ICON[c.status]} ${STATUS_LABEL[c.status] || c.status}
              </span>
              <span class="result-card__date">Candidatura em ${formatDate(c.appliedAt)}</span>
            </div>
          </div>

          ${c.history && c.history.length > 0 ? `
          <div style="border-top:1px solid rgba(255,255,255,.06); padding-top:14px;">
            <p style="font-size:.72rem;color:var(--fire);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 12px;">
              Histórico
            </p>
            <div class="timeline">
              ${c.history.map(h => `
                <div class="timeline-item">
                  <div class="timeline-item__status">${STATUS_ICON[h.newStatus] || '•'} ${STATUS_LABEL[h.newStatus] || h.newStatus}</div>
                  <div class="timeline-item__date">${formatDate(h.changedAt)}</div>
                  ${h.note ? `<div class="timeline-item__note">"${h.note}"</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>` : ''}
        </div>
      `).join('')}`;
  } catch (e) {
    alert.className = 'alert alert--error';
    alert.textContent = '❌ ' + e.message;
    alert.style.display = 'block';
    results.style.display = 'none';
  } finally {
    btn.disabled = false; btn.textContent = '🔍 Consultar';
  }
}
</script>
</body>
</html>
