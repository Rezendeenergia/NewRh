<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisar Solicitação — Rezende Energia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0B0F14;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #141820;
      border: 1px solid rgba(255,255,255,.08);
      border-top: 3px solid #FF6A00;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
    }
    .card__header {
      background: linear-gradient(135deg, #1C2230, #141820);
      padding: 28px 32px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      text-align: center;
    }
    .brand { font-size: 22px; font-weight: 900; color: #fff; }
    .brand span { color: #FF6A00; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,.35); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .card__body { padding: 32px; }
    h2 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .section-title { font-size: 11px; color: rgba(255,106,0,.8); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    .info-block {
      background: rgba(255,106,0,.06);
      border: 1px solid rgba(255,106,0,.18);
      border-left: 3px solid #FF6A00;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .info-block__label { font-size: 10px; color: #FF6A00; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    .info-block__value { font-size: 16px; font-weight: 800; color: #fff; }
    .info-block__sub { font-size: 13px; color: #A8A8B8; margin-top: 3px; }
    .table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-bottom: 24px; }
    .table td { padding: 10px 14px; font-size: 14px; border-radius: 8px; }
    .table .lbl { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); color: rgba(255,106,0,.8); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; width: 38%; }
    .table .val { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.04); color: #F4F5F7; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,.06); margin: 24px 0; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .btn {
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn--approve { background: #0D2E1A; border-color: #2ECC71; color: #2ECC71; }
    .btn--reject  { background: #2E0D0D; border-color: #FF5252; color: #FF5252; }
    .btn--approve:hover:not(:disabled) { background: #0F3A1F; }
    .btn--reject:hover:not(:disabled)  { background: #3A0F0F; }
    .motivo-wrap { margin-top: 16px; display: none; }
    .motivo-wrap label { font-size: 13px; color: #A8A8B8; display: block; margin-bottom: 6px; }
    .motivo-wrap textarea {
      width: 100%;
      background: #1C2230;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      color: #F4F5F7;
      font-size: 14px;
      padding: 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }
    .btn--confirm {
      margin-top: 10px;
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #FF8C2A, #FF6A00, #E55A00);
      color: #000;
    }
    .btn--confirm:disabled { opacity: .5; cursor: not-allowed; }
    .alert {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      text-align: center;
      display: none;
    }
    .alert--success { background: #0D2E1A; border: 1px solid #2ECC71; color: #2ECC71; }
    .alert--error   { background: #2E0D0D; border: 1px solid #FF5252; color: #FF5252; }
    .loading { text-align: center; color: #5A6478; padding: 40px; }
    .card__footer { padding: 16px 32px; border-top: 1px solid rgba(255,255,255,.06); text-align: center; }
    .card__footer p { font-size: 12px; color: rgba(255,255,255,.2); line-height: 1.5; }
  </style>
</head>
<body>
<div class="card">
  <div class="card__header">
    <div class="brand">⚡ Rezende <span>Energia</span></div>
    <div class="subtitle">Aprovação de Solicitação de Vaga</div>
  </div>
  <div class="card__body" id="content">
    <div class="loading">⏳ Carregando solicitação...</div>
  </div>
  <div class="card__footer">
    <p>Rezende Construção e Manutenção Ltda · Santarém, PA<br>
       Esta página é exclusiva para aprovação de vagas.</p>
  </div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const token  = params.get('token') || '';
  const contentEl = document.getElementById('content');

  if (!token) {
    contentEl.innerHTML = '<div class="alert alert--error" style="display:block">❌ Token inválido ou expirado.</div>';
    return;
  }

  // Busca dados da solicitação pelo token
  let sol = null;
  try {
    const resp = await fetch(`/api/solicitacoes/by-token?token=${encodeURIComponent(token)}`);
    if (!resp.ok) throw new Error('not found');
    sol = await resp.json();
  } catch {
    contentEl.innerHTML = '<div class="alert alert--error" style="display:block">❌ Solicitação não encontrada ou link expirado.</div>';
    return;
  }

  if (sol.status !== 'PENDENTE') {
    const cor = sol.status === 'APROVADA' ? '#2ECC71' : '#FF5252';
    const ico = sol.status === 'APROVADA' ? '✅' : '❌';
    contentEl.innerHTML = `
      <h2 style="text-align:center;margin-bottom:8px;">${ico} Já Decidida</h2>
      <p class="section-title" style="text-align:center;">Esta solicitação já foi processada</p>
      <div style="text-align:center;padding:16px;background:rgba(255,255,255,.03);border-radius:12px;">
        <span style="color:${cor};font-size:18px;font-weight:800;">Situação: ${sol.status}</span>
      </div>`;
    return;
  }

  // Renderiza formulário
  contentEl.innerHTML = `
    <h2>Solicitação de Vaga</h2>
    <p class="section-title">Analise os dados abaixo e tome uma decisão</p>

    <div class="info-block">
      <div class="info-block__label">Solicitante</div>
      <div class="info-block__value">${sol.solicitanteNome}</div>
      <div class="info-block__sub">✉️ ${sol.solicitanteEmail}</div>
    </div>

    <table class="table">
      <tr><td class="lbl">Cargo</td><td class="val">${sol.position}</td></tr>
      <tr><td class="lbl">Localização</td><td class="val">📍 ${sol.location}</td></tr>
      <tr><td class="lbl">Tipo</td><td class="val">${sol.tipo || '—'}</td></tr>
      <tr><td class="lbl">Nº de Vagas</td><td class="val">${sol.numVagas}</td></tr>
      ${sol.finalidade ? `<tr><td class="lbl">Finalidade</td><td class="val">${sol.finalidade}</td></tr>` : ''}
      <tr><td class="lbl">Justificativa</td><td class="val">${sol.justificativa}</td></tr>
    </table>

    <hr class="divider">
    <p style="font-size:13px;color:#A8A8B8;margin-bottom:16px;text-align:center;">
      Ao aprovar, a vaga será criada e publicada automaticamente no portal.
    </p>

    <div class="btn-group">
      <button class="btn btn--approve" id="btn-approve">✅ Aprovar</button>
      <button class="btn btn--reject"  id="btn-reject">❌ Rejeitar</button>
    </div>

    <div class="motivo-wrap" id="motivo-wrap">
      <label for="motivo-txt">Motivo da rejeição (será enviado ao gestor):</label>
      <textarea id="motivo-txt" placeholder="Descreva o motivo..."></textarea>
      <button class="btn--confirm" id="btn-confirm-reject">Confirmar Rejeição</button>
    </div>

    <div class="alert alert--success" id="alert-ok"></div>
    <div class="alert alert--error"   id="alert-err"></div>
  `;

  const btnApprove = document.getElementById('btn-approve');
  const btnReject  = document.getElementById('btn-reject');
  const motivoWrap = document.getElementById('motivo-wrap');
  const btnConfirm = document.getElementById('btn-confirm-reject');
  const alertOk    = document.getElementById('alert-ok');
  const alertErr   = document.getElementById('alert-err');

  async function decide(decision, motivo) {
    [btnApprove, btnReject, btnConfirm].forEach(b => b && (b.disabled = true));
    alertOk.style.display = 'none';
    alertErr.style.display = 'none';
    try {
      const r = await fetch(`/api/solicitacoes/revisar-portal?token=${encodeURIComponent(token)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision, motivo: motivo || '' }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.message || 'Erro');
      alertOk.textContent = decision === 'APROVADA'
        ? '✅ Vaga aprovada e publicada com sucesso!'
        : '❌ Solicitação rejeitada. O gestor foi notificado.';
      alertOk.style.display = 'block';
      [btnApprove, btnReject].forEach(b => b.style.display = 'none');
      motivoWrap.style.display = 'none';
    } catch (e) {
      alertErr.textContent = '❌ ' + e.message;
      alertErr.style.display = 'block';
      [btnApprove, btnReject, btnConfirm].forEach(b => b && (b.disabled = false));
    }
  }

  btnApprove.addEventListener('click', () => decide('APROVADA', null));

  btnReject.addEventListener('click', () => {
    motivoWrap.style.display = motivoWrap.style.display === 'block' ? 'none' : 'block';
  });

  btnConfirm.addEventListener('click', () => {
    const motivo = document.getElementById('motivo-txt').value.trim();
    decide('REJEITADA', motivo);
  });
})();
</script>
</body>
</html>
